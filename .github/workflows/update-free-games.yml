name: Update Free Games from All Stores

on:
  schedule:
    - cron: '0 */6 * * *' # كل 6 ساعات
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-free-games:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update timestamp in JSON files
        run: |
          python -c "
          import json
          import datetime
          
          # الحصول على التوقيت الحالي
          current_time = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')
          
          # قائمة ملفات JSON
          json_files = [
              'free_goods_detail.json',
              'epic_goods_detail.json',
              'gog_goods_detail.json',
              'ubisoft_goods_detail.json',
              'playstation_goods_detail.json',
              'xbox_goods_detail.json'
          ]
          
          # تحديث كل ملف
          for file_path in json_files:
              try:
                  # قراءة الملف الحالي
                  with open(file_path, 'r', encoding='utf-8') as f:
                      data = json.load(f)
                  
                  # تحديث التوقيت
                  data['update_time'] = current_time
                  
                  # حفظ الملف
                  with open(file_path, 'w', encoding='utf-8') as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  
                  print(f'Updated timestamp in {file_path}')
              except Exception as e:
                  print(f'Error updating {file_path}: {e}')
                  # إنشاء ملف جديد إذا لم يكن موجوداً
                  with open(file_path, 'w', encoding='utf-8') as f:
                      json.dump({'update_time': current_time, 'free_list': [], 'discounted_list': []}, f, ensure_ascii=False, indent=2)
                  print(f'Created new {file_path}')
          "

      - name: Run Steam balash.py
        run: python balash.py
        continue-on-error: true

      - name: Run Epic Games balash.py
        run: python epic_balash.py
        continue-on-error: true

      - name: Run GOG balash.py
        run: python gog_balash.py
        continue-on-error: true

      - name: Run Ubisoft balash.py
        run: python ubisoft_balash.py
        continue-on-error: true

      - name: Run PlayStation balash.py
        run: python playstation_balash.py
        continue-on-error: true

      - name: Run Xbox balash.py
        run: python xbox_balash.py
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          git commit -m 'Update free games from all stores [bot]'
          git push
