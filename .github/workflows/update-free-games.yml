name: Update Free Games from All Stores

on:
  schedule:
    - cron: '0 3,9,15,21 * * *' # كل 6 ساعات (بتوقيت UTC)
  workflow_dispatch:

concurrency:
  group: update-free-games
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-free-games:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "requirements.txt not found"; fi

      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          echo "Python files:"
          ls -la *.py || true
          echo "JSON files:"
          ls -la *.json || true

      - name: Update timestamp in JSON files
        run: |
          if [ -f update_timestamp.py ]; then python update_timestamp.py; else echo "update_timestamp.py not found"; fi

      - name: Run Steam script (balash.py or steam.py)
        run: |
          if [ -f steam.py ]; then python steam.py; elif [ -f balash.py ]; then python balash.py; else echo "No Steam script found"; fi
        continue-on-error: true

      - name: Run Epic Games script
        run: |
          python epic.py
        continue-on-error: true

      - name: Run GOG script
        run: |
          python gog.py
        continue-on-error: true

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          python -c "import json, os\nfiles=['free_goods_detail.json','epic_goods_detail.json','gog_goods_detail.json','update_timestamp.json']\nfor f in files:\n    if not os.path.exists(f):\n        print(f'[warn] {f} not found')\n        continue\n    s = open(f,'r',encoding='utf-8').read().strip()\n    if not s:\n        print(f'[fix] {f} empty -> writing {{}}')\n        open(f,'w',encoding='utf-8').write('{}')\n        continue\n    try:\n        json.loads(s)\n        print(f'[ok] {f} valid')\n    except Exception as e:\n        print(f'[fix] {f} invalid JSON ({e}) -> writing {{}}')\n        open(f,'w',encoding='utf-8').write('{}')"

      - name: Debug - Show final JSON
        run: |
          ls -lh *.json || true
          wc -l *.json || true

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git status --porcelain
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase
          git add -A
          git commit -m "Auto update free games [bot]"
          git push
