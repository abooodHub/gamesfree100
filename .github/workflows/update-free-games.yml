name: Update Free Games from All Stores

on:
  schedule:
    - cron: '0 3,9,15,21 * * *' # كل 6 ساعات (الساعات 3، 9، 15، 21 بتوقيت UTC)
  workflow_dispatch:

concurrency:
  group: update-free-games
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-free-games:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          echo "Python files available:"
          ls -la *.py
          echo "JSON files available:"
          ls -la *.json

      - name: Update timestamp in JSON files
        run: |
          echo "Starting timestamp update..."
          if [ -f update_timestamp.py ]; then python update_timestamp.py; else echo "update_timestamp.py not found, skipping"; fi
          echo "Timestamp update completed!"

      - name: Run Steam script
        run: |
          echo "Running Steam script..."
          if [ -f steam.py ]; then python steam.py; elif [ -f balash.py ]; then python balash.py; else echo "No Steam script found"; fi
          echo "Steam script completed!"
        continue-on-error: true

      - name: Run Epic Games balash.py
        run: |
          echo "Running Epic script..."
          python epic_balash.py
          echo "Epic script completed!"
        continue-on-error: true

      - name: Run GOG balash.py
        run: |
          echo "Running GOG script..."
          python gog_balash.py
          echo "GOG script completed!"
        continue-on-error: true

      - name: Run Ubisoft balash.py
        run: |
          echo "Running Ubisoft script..."
          python ubisoft_balash.py
          echo "Ubisoft script completed!"
        continue-on-error: true

      - name: Run PlayStation balash.py
        run: |
          echo "Running PlayStation script..."
          python playstation_balash.py
          echo "PlayStation script completed!"
        continue-on-error: true

      - name: Run Xbox balash.py
        run: |
          echo "Running Xbox script..."
          python xbox_balash.py
          echo "Xbox script completed!"
        continue-on-error: true

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          python - << 'PY'
          import json, os
          files = [
              'free_goods_detail.json',
              'epic_goods_detail.json',
              'gog_goods_detail.json',
              'ubisoft_goods_detail.json',
              'playstation_goods_detail.json',
              'xbox_goods_detail.json',
              'update_timestamp.json',
          ]
          for f in files:
              if not os.path.exists(f):
                  print(f"[warn] {f} not found")
                  continue
              try:
                  s = open(f,'r',encoding='utf-8').read().strip()
                  if not s:
                      print(f"[fix] {f} empty -> writing {}")
                      open(f,'w',encoding='utf-8').write('{}')
                      continue
                  json.loads(s)
                  print(f"[ok] {f} valid")
              except Exception as e:
                  print(f"[fix] {f} invalid JSON ({e}) -> writing {}")
                  open(f,'w',encoding='utf-8').write('{}')
          PY
          echo "Validation done."

      - name: Debug - Show final files
        run: |
          echo "Final JSON files:"
          ls -lh *.json || true
          echo "File line counts:"
          wc -l *.json || true

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --porcelain
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add free_goods_detail.json epic_goods_detail.json gog_goods_detail.json ubisoft_goods_detail.json playstation_goods_detail.json xbox_goods_detail.json update_timestamp.json || true
          git commit -m 'Update free games from all stores [bot]'
          git push
